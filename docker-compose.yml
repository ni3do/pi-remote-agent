services:
  pi-agent:
    build: .
    container_name: pi-remote-agent
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env
    volumes:
      # Workspace: configurable host path via env var, or Docker named volume
      - ${WORKSPACE_HOST_PATH:-pi-workspace}:/workspace

      # Persist pi sessions
      - ${SESSIONS_HOST_PATH:-pi-sessions}:/root/.pi/agent/sessions

    environment:
      - WORKSPACE_DIR=/workspace
      # Speech-to-text (local Whisper). Set STT_ENABLED=true to activate.
      - STT_ENABLED=${STT_ENABLED:-false}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - WHISPER_LANGUAGE=${WHISPER_LANGUAGE:-en}

# Fallback named volumes (used when env vars are not set)
volumes:
  pi-workspace:
  pi-sessions:
