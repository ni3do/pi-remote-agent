services:
  pi-agent:
    build: .
    container_name: pi-remote-agent
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env
    volumes:
      # Workspace: configurable host path via env var, or Docker named volume
      - ${WORKSPACE_HOST_PATH:-pi-workspace}:/workspace

      # Pi agent config (auth.json lives here, token refresh persists across restarts)
      - pi-agent-config:/root/.pi/agent

    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - WORKSPACE_DIR=/workspace
      # Speech-to-text (local Whisper). Set STT_ENABLED=true to activate.
      - STT_ENABLED=${STT_ENABLED:-false}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - WHISPER_LANGUAGE=${WHISPER_LANGUAGE:-en}

# Named volumes (managed by Docker, persist across restarts and redeploys)
volumes:
  pi-workspace:
  pi-agent-config:
